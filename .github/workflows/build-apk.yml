name: ECUAMAPS PRO - Final Native Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  NDK_VERSION: 25.2.9519653

jobs:
  build-android:
    name: Industrial NDK Compilation
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout (Full History + Recursive Submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 2. Install Build Tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build g++-multilib python3-dev clang ccache

      - name: 3. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 4. Setup Android NDK
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: 5. Initialize Boost Engine
        run: |
          cd 3party/boost
          ./bootstrap.sh
          ./b2 headers
        # Note: We only need headers for the C++ engine usually, but we follow b2 initialization

      - name: 6. Rebrand Application ID (Author Attribution)
        run: |
          sed -i "s/appId = 'app.ecuamaps'/appId = 'com.tranquilino.ecuamaps'/g" android/build.gradle
          # Verify change
          grep "appId =" android/build.gradle

      - name: 7. Permissions & Configuration
        run: |
          chmod +x ./configure.sh
          chmod +x ./android/gradlew
          ./configure.sh

      - name: 8. Execute Industrial Compilation
        working-directory: android
        run: |
          ./gradlew assembleWebDebug \
            -Parm64 \
            -Dorg.gradle.project.android.enableLint=false \
            --stacktrace

      - name: 9. Persistence of APK
        uses: actions/upload-artifact@v4
        with:
          name: ECUAMAPS-PRO-Final-APK
          path: android/app/build/outputs/apk/**/ecuamaps-*.apk
          if-no-files-found: error
