name: ECUAMAPS PRO - Generador de APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK Nativa
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 200
          submodules: recursive

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Instalar Herramientas de Compilación
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build cmake g++-multilib

      - name: Configurar Repositorio
        run: ./configure.sh

      - name: Compilar APK (WebDebug)
        working-directory: android
        run: |
          cmake --version
          ninja --version
          ./gradlew -Parm64 assembleWebDebug --stacktrace

      - name: Entregar APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ecuamaps-pro-apk
          path: android/app/build/outputs/apk/**/ecuamaps-*.apk
          if-no-files-found: error
